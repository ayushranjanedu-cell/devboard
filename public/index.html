<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devboard Real-Time Test</title>
    <style>
        body{font-family:Arial,sans-serif;max-width: 800px;margin: 50px auto;padding: 20px;}
        #event{border:1px solid #ccc;padding: 15px;height: 300px;overflow-y: auto;background: #f9f9f9;}
        .event{padding: 8px;margin:5px 0;border-radius: 4px;}
        .created{background: #d4edda;}
        .updated{background: #fff3cd;}
        .deleted{background: #f8d7da;}
        h2{color:#333;}
    </style>
</head>
<body>
    <h1>Devboard Real-Time Events</h1>
    <p>Connected clients will see task changes instantly below:</p>
    <div id="events"></div>
   <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const eventsDiv = document.getElementById('events');
        function addEvent(message , type ){
            const div = document.createElement('div');
            div.className = `event ${type}`;
            div.textContent =`${new Date().toLocaleTimeString()}-${message}`;
            eventsDiv.prepend(div);  
        }
        socket.on('connect',()=>{
            addEvent(`Connected with ID:${socket.id}`,'created');
        });
        socket.on('task:created',(task)=>{
            addEvent(`Task CREATED:"${task.title}"`,'created');
        });
        socket.on('task:updated',(task)=>{
            addEvent(`Task UPDATED:"${task.title}"->${task.status}`,'updated');
        });

</body>
</html>
